    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Rampify",
      "url": "https://rampify-eight.vercel.app",
      "description": "Browser-based video speed ramping editor with AI slow motion, beat sync, motion blur, and 4K export. No installs. Your footage never leaves your machine.",
      "applicationCategory": "VideoApplication",
      "operatingSystem": "Any modern web browser",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "12",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "RecurringChargeSpecification",
            "price": "12",
            "priceCurrency": "USD",
            "billingDuration": "P1M"
          }
        }
      ],
      "featureList": [
        "Speed curve editor with bezier and linear interpolation",
        "AI frame interpolation powered by RIFE neural network",
        "Beat sync with STFT spectral flux detection",
        "Cinematic motion blur on speed transitions",
        "4K export via ffmpeg.wasm",
        "100% local processing — no video uploads"
      ],
      "publisher": {
        "@type": "Organization",
        "name": "Rampify",
        "url": "https://rampify-eight.vercel.app"
      }
    }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need to install anything to use Rampify?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Rampify runs entirely in your browser using WebAssembly. ffmpeg.wasm handles video encoding in a Web Worker, and AI interpolation runs via ONNX Runtime Web. No downloads, no plugins, no native apps."
          }
        },
        {
          "@type": "Question",
          "name": "Does my video get uploaded to a server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. All video processing happens locally in your browser. Your footage never leaves your machine. The only server calls are for authentication and subscription management."
          }
        },
        {
          "@type": "Question",
          "name": "What video formats does Rampify support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any format ffmpeg supports — MP4, WebM, MOV, MKV, AVI, and more. Export supports MP4 (H.264) and WebM (VP9) up to 4K resolution on Pro."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI slow motion work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Rampify uses RIFE (Real-time Intermediate Flow Estimation), a neural network that generates intermediate frames between existing ones. This creates smooth slow motion without judder. It runs on GPU via WebGL when available, with CPU fallback."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my Rampify subscription anytime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Cancel from the account menu with one click. No questions, no retention emails. Your Pro access continues until the end of your billing period, then you drop to the free plan."
          }
        }
      ]
    }
    </script>
