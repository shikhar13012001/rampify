<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Rampify OG image — 1200×630, Clay design system -->
  <!-- Background: warm cream canvas -->
  <rect width="1200" height="630" fill="#fffaf0"/>

  <!-- Subtle curve decoration: speed ramp visualization -->
  <g opacity="0.08">
    <path d="M 0 420 C 200 420 300 180 500 180 C 700 180 800 480 1000 480 C 1100 480 1150 380 1200 380" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 0 420 C 200 420 300 180 500 180 C 700 180 800 480 1000 480 C 1100 480 1150 380 1200 380" stroke="#0a0a0a" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Pink accent dot (from logo) -->
  <circle cx="1050" cy="180" r="8" fill="#ff4d8b"/>

  <!-- Logo mark — top left -->
  <g transform="translate(80, 72)">
    <rect width="44" height="44" rx="12" fill="#0a0a0a"/>
    <polyline points="8,30 16,20 26,10 36,18" stroke="#fffaf0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="36" cy="18" r="4" fill="#ff4d8b"/>
  </g>

  <!-- Wordmark -->
  <text x="136" y="103" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#0a0a0a" letter-spacing="-0.8">rampify</text>

  <!-- Eyebrow -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ff4d8b" letter-spacing="2.4">SPEED RAMP VIDEO EDITOR</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#0a0a0a" letter-spacing="-2">Speed ramp videos</text>
  <text x="80" y="354" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#0a0a0a" letter-spacing="-2">in your browser.</text>

  <!-- Subheadline -->
  <text x="80" y="412" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#4a4a4a">No installs. No uploads. Your footage never leaves your machine.</text>

  <!-- Feature pills -->
  <g font-family="Inter, sans-serif" font-size="15" font-weight="600">
    <!-- Pill 1: Speed curves -->
    <rect x="80" y="470" width="150" height="38" rx="19" fill="#f5f0e0" stroke="#e5dfd0" stroke-width="1"/>
    <text x="155" y="494" text-anchor="middle" fill="#0a0a0a">Speed curves</text>

    <!-- Pill 2: AI slow motion -->
    <rect x="244" y="470" width="160" height="38" rx="19" fill="#f5f0e0" stroke="#e5dfd0" stroke-width="1"/>
    <text x="324" y="494" text-anchor="middle" fill="#0a0a0a">AI slow motion</text>

    <!-- Pill 3: Beat sync -->
    <rect x="418" y="470" width="120" height="38" rx="19" fill="#f5f0e0" stroke="#e5dfd0" stroke-width="1"/>
    <text x="478" y="494" text-anchor="middle" fill="#0a0a0a">Beat sync</text>

    <!-- Pill 4: 4K export -->
    <rect x="552" y="470" width="110" height="38" rx="19" fill="#f5f0e0" stroke="#e5dfd0" stroke-width="1"/>
    <text x="607" y="494" text-anchor="middle" fill="#0a0a0a">4K export</text>
  </g>

  <!-- Bottom CTA bar -->
  <rect x="80" y="540" width="380" height="50" rx="12" fill="#0a0a0a"/>
  <text x="270" y="571" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#fffaf0">Free to start — rampify.app</text>

  <!-- URL bottom right -->
  <text x="1120" y="571" text-anchor="end" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#8a8a8a">rampify-eight.vercel.app</text>
</svg>